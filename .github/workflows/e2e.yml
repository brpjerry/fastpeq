name: E2E

# End-to-end smokes over the real built app via WebdriverIO + tauri-driver.
# Manual-dispatch only for now: it's slower than the unit suite and drives a
# real WebView2 window, so it's kept off push/PR until proven stable. Once it
# has a track record, add a `schedule:` (nightly) trigger here.
on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install tauri-driver
        run: cargo install tauri-driver

      # msedgedriver must match the runner's Edge / WebView2 runtime (same
      # Evergreen Chromium). Read the version from the Edge binary itself — the
      # registry BLBeacon key isn't always present — and fall back to the latest
      # build for that major if the exact one isn't published.
      - name: Install matching msedgedriver
        shell: pwsh
        run: |
          $edge = Get-ChildItem `
            "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe", `
            "C:\Program Files\Microsoft\Edge\Application\msedge.exe" `
            -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $edge) { throw "Microsoft Edge not found on the runner" }
          $ver = $edge.VersionInfo.ProductVersion
          Write-Host "Edge version: $ver"
          New-Item -ItemType Directory -Force e2e/drivers | Out-Null
          $zip = "$env:RUNNER_TEMP/edgedriver.zip"
          try {
            Invoke-WebRequest "https://msedgedriver.microsoft.com/$ver/edgedriver_win64.zip" -OutFile $zip -ErrorAction Stop
          } catch {
            $major = $ver.Split('.')[0]
            $latest = (Invoke-WebRequest "https://msedgedriver.microsoft.com/LATEST_RELEASE_${major}_WINDOWS" -ErrorAction Stop).Content -replace '[^\d\.]', ''
            Write-Host "Exact $ver unavailable; using latest $major.x: $latest"
            Invoke-WebRequest "https://msedgedriver.microsoft.com/$latest/edgedriver_win64.zip" -OutFile $zip -ErrorAction Stop
          }
          Expand-Archive $zip -DestinationPath e2e/drivers -Force
          Get-ChildItem e2e/drivers

      # Must be a `tauri build` (not a raw `cargo build`): that embeds the
      # frontend (dist/) into the binary. A plain debug `cargo build` loads the
      # dev-server URL instead, which doesn't exist in CI. --no-bundle skips the
      # installers; --debug keeps it in target/debug/ where the harness looks.
      - name: Build app with embedded frontend
        run: npx tauri build --debug --no-bundle

      # Capture E2E test output to a file so we can build a report.
      # continue-on-error ensures the pipeline keeps running even if tests fail.
      - name: Run E2E smokes
        id: e2e-tests
        continue-on-error: true
        run: |
          mkdir -p ${{ github.workspace }}/test-results
          npm run e2e > ${{ github.workspace }}/test-results/e2e.log 2>&1 || exit 0

      # Generate a markdown test report from the captured logs.
      # This step always runs so the artifact is published regardless of CI outcome.
      - name: Generate E2E test report
        if: always()
        shell: pwsh
        run: |
          $reportPath = '${{ github.workspace }}/test-report.md'
          $e2eLog     = '${{ github.workspace }}/test-results/e2e.log'
          function Get-TestStatus {
            param([string]$path)
            if (-not (Test-Path $path)) { return 'No output captured' }
            $content = Get-Content $path -Raw
            if ($content -match '\bfailed\b|FAIL') { return 'FAILED' }
            if ($content -match '\bpassed\b|PASS') { return 'PASSED' }
            return 'UNKNOWN'
          }
          $e2eStatus = Get-TestStatus -path $e2eLog
          Set-Content -Path $reportPath -Value "# Test Report — E2E`n" -Encoding UTF8
          Add-Content -Path $reportPath -Value "**Commit:** `${{ github.sha }}`" -Encoding UTF8
          Add-Content -Path $reportPath -Value "**Branch/Ref:** `${{ github.ref_name }}`" -Encoding UTF8
          Add-Content -Path $reportPath -Value "**Triggered by:** `${{ github.event_name }}`" -Encoding UTF8
          Add-Content -Path $reportPath -Value "**Date:** `$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')`" -Encoding UTF8
          Add-Content -Path $reportPath -Value "`n---`n" -Encoding UTF8
          Add-Content -Path $reportPath -Value "## E2E Smokes (WebdriverIO)" -Encoding UTF8
          Add-Content -Path $reportPath -Value "**Status:** `$e2eStatus`" -Encoding UTF8
          if (Test-Path $e2eLog) {
            $content = Get-Content $e2eLog -Raw
            $summaryLine = ($content -split "`r?`n" | Select-String -Pattern 'passed|failed|spec' -CaseSensitive:$false | Select-Object -Last 1)
            if ($summaryLine) {
              Add-Content -Path $reportPath -Value "**Summary:** `$(($summaryLine).Trim())`" -Encoding UTF8
            }
          }
          Add-Content -Path $reportPath -Value "`n<details><summary>Raw output</summary>`n`n```" -Encoding UTF8
          if (Test-Path $e2eLog) { Get-Content $e2eLog -Raw | Add-Content -Path $reportPath -Encoding UTF8 }
          Add-Content -Path $reportPath -Value "````n</details>" -Encoding UTF8

      # Re-fail the job if E2E tests actually failed.
      - name: Fail on test errors
        if: always()
        shell: pwsh
        run: |
          $e2eFailed = $false
          if (Test-Path '${{ github.workspace }}/test-results/e2e.log') {
              $content = Get-Content '${{ github.workspace }}/test-results/e2e.log' -Raw
              if ($content -match '\bfailed\b|FAIL') { $e2eFailed = $true }
          }
          if ($e2eFailed) {
              Write-Error "E2E tests failed. See the test report artifact for details."
              exit 1
          }

      # Upload the markdown test report as an artifact.
      # Always runs so it is published regardless of CI outcome.
      - name: Upload E2E test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-report
          path: ${{ github.workspace }}/test-report.md
          retention-days: 14
