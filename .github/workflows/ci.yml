name: CI

# Lint, type-check, and test on every push and pull request. Runs on Windows
# because the Tauri shell crate has Windows-only code (registry, DWM titlebar);
# the core crate is cross-platform but is covered here too.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Svelte type-check
        run: npm run check

      # Capture frontend test output to a file so we can build a report.
      # continue-on-error ensures the pipeline keeps running even if tests fail.
      - name: Frontend unit tests
        id: fe-tests
        continue-on-error: true
        run: |
          mkdir -p ${{ github.workspace }}/test-results
          npm test > ${{ github.workspace }}/test-results/frontend.log 2>&1 || exit 0

      # Builds the frontend into dist/, which the Tauri build script embeds —
      # so it must exist before cargo compiles the shell crate below.
      - name: Build frontend
        run: npm run build

      - name: Rust formatting
        run: cargo fmt --all --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Capture Rust test output to a file so we can build a report.
      # continue-on-error ensures the pipeline keeps running even if tests fail.
      - name: Rust tests
        id: rust-tests
        continue-on-error: true
        run: |
          cargo test --workspace > ${{ github.workspace }}/test-results/rust.log 2>&1 || exit 0

      # Generate a markdown test report from the captured logs.
      # This step always runs so the artifact is published regardless of CI outcome.
      - name: Generate test report
        if: always()
        shell: bash
        run: |
          REPORT="${{ github.workspace }}/test-report.md"
          FE_LOG="${{ github.workspace }}/test-results/frontend.log"
          RUST_LOG="${{ github.workspace }}/test-results/rust.log"

          get_status() {
            local path="$1"
            if [ ! -f "$path" ]; then echo "No output captured"; return; fi
            if grep -qiE '\bfailed\b|FAIL' "$path"; then echo "FAILED"; return; fi
            if grep -qiE '\bpassed\b|PASS' "$path"; then echo "PASSED"; return; fi
            echo "UNKNOWN"
          }

          add_suite() {
            local title="$1" log_path="$2" pattern="$3"
            local status=$(get_status "$log_path")
            echo "## $title" >> "$REPORT"
            echo "**Status:** $status" >> "$REPORT"
            if [ -f "$log_path" ]; then
              summary_line=$(grep -iE "$pattern" "$log_path" | tail -1)
              if [ -n "$summary_line" ]; then
                echo "**Summary:** `$(echo "$summary_line")`" >> "$REPORT"
              fi
              echo "" >> "$REPORT"
              echo "<details><summary>Raw output</summary>" >> "$REPORT"
              echo "" >> "$REPORT"
              echo '```' >> "$REPORT"
              cat "$log_path" >> "$REPORT"
              echo '' >> "$REPORT"
              echo '```' >> "$REPORT"
              echo "</details>" >> "$REPORT"
            fi
          }

          echo "# Test Report — CI" > "$REPORT"
          echo "**Commit:** `${{ github.sha }}`" >> "$REPORT"
          echo "**Branch/Ref:** `${{ github.ref_name }}`" >> "$REPORT"
          echo "**Triggered by:** `${{ github.event_name }}`" >> "$REPORT"
          echo "**Date:** `$(date '+%Y-%m-%d %H:%M:%S')`" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "---" >> "$REPORT"
          add_suite "Frontend Unit Tests (vitest)" "$FE_LOG" 'Tests|passed|failed'
          echo "" >> "$REPORT"
          echo "---" >> "$REPORT"
          add_suite "Rust Tests (cargo test)" "$RUST_LOG" 'test result|passed|failed'

      # Re-fail the job if any test suite actually failed.
      - name: Fail on test errors
        if: always()
        shell: pwsh
        run: |
          $feFailed = $false
          $rustFailed = $false
          if (Test-Path '${{ github.workspace }}/test-results/frontend.log') {
              $content = Get-Content '${{ github.workspace }}/test-results/frontend.log' -Raw
              if ($content -match '\bfailed\b|FAIL') { $feFailed = $true }
          }
          if (Test-Path '${{ github.workspace }}/test-results/rust.log') {
              $content = Get-Content '${{ github.workspace }}/test-results/rust.log' -Raw
              if ($content -match '\bfailed\b|FAIL') { $rustFailed = $true }
          }
          if ($feFailed -or $rustFailed) {
              Write-Error "One or more test suites failed. See the test report artifact for details."
              exit 1
          }

      # Upload the markdown test report as an artifact.
      # Always runs so it is published regardless of CI outcome.
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-report
          path: ${{ github.workspace }}/test-report.md
          retention-days: 14
