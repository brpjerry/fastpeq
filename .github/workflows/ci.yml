name: CI

# Lint, type-check, and test on every push and pull request. Runs on Windows
# because the Tauri shell crate has Windows-only code (registry, DWM titlebar);
# the core crate is cross-platform but is covered here too.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Svelte type-check
        run: npm run check

      # Capture frontend test output to a file so we can build a report.
      # continue-on-error ensures the pipeline keeps running even if tests fail.
      - name: Frontend unit tests
        id: fe-tests
        continue-on-error: true
        run: |
          mkdir -p ${{ github.workspace }}/test-results
          npm test > ${{ github.workspace }}/test-results/frontend.log 2>&1 || exit 0

      # Builds the frontend into dist/, which the Tauri build script embeds —
      # so it must exist before cargo compiles the shell crate below.
      - name: Build frontend
        run: npm run build

      - name: Rust formatting
        run: cargo fmt --all --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Capture Rust test output to a file so we can build a report.
      # continue-on-error ensures the pipeline keeps running even if tests fail.
      - name: Rust tests
        id: rust-tests
        continue-on-error: true
        run: |
          cargo test --workspace > ${{ github.workspace }}/test-results/rust.log 2>&1 || exit 0

      # Generate a markdown test report from the captured logs.
      # This step always runs so the artifact is published regardless of CI outcome.
      - name: Generate test report
        if: always()
        shell: pwsh
        run: |
          $reportPath = '${{ github.workspace }}/test-report.md'
          $feLog    = '${{ github.workspace }}/test-results/frontend.log'
          $rustLog  = '${{ github.workspace }}/test-results/rust.log'
          function Get-TestStatus { param([string]$path); if (-not (Test-Path $path)) { return 'No output captured' }; $content = Get-Content $path -Raw; if ($content -match '\bfailed\b|FAIL') { return 'FAILED' }; if ($content -match '\bpassed\b|PASS') { return 'PASSED' }; return 'UNKNOWN' }
          function Add-SuiteSection { param([string]$title, [string]$logPath, [string]$pattern); $status = Get-TestStatus -path $logPath; Add-Content -Path $reportPath -Value "## $title" -Encoding UTF8; Add-Content -Path $reportPath -Value "**Status:** `$status`" -Encoding UTF8; if (Test-Path $logPath) { $content = Get-Content $logPath -Raw; $summaryLine = ($content -split "`r?`n" | Select-String -Pattern $pattern -CaseSensitive:$false | Select-Object -Last 1); if ($summaryLine) { Add-Content -Path $reportPath -Value "**Summary:** `$(($summaryLine).Trim())`" -Encoding UTF8 }; Add-Content -Path $reportPath -Value "`n<details><summary>Raw output</summary>`n`n```" -Encoding UTF8; Get-Content $logPath -Raw | Add-Content -Path $reportPath -Encoding UTF8; Add-Content -Path $reportPath -Value "````n</details>" -Encoding UTF8 } }
          Set-Content -Path $reportPath -Value "# Test Report — CI`n" -Encoding UTF8
          Add-Content -Path $reportPath -Value "**Commit:** `${{ github.sha }}`" -Encoding UTF8
          Add-Content -Path $reportPath -Value "**Branch/Ref:** `${{ github.ref_name }}`" -Encoding UTF8
          Add-Content -Path $reportPath -Value "**Triggered by:** `${{ github.event_name }}`" -Encoding UTF8
          Add-Content -Path $reportPath -Value "**Date:** `$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')`" -Encoding UTF8
          Add-Content -Path $reportPath -Value "`n---`n" -Encoding UTF8
          Add-SuiteSection -title "Frontend Unit Tests (vitest)" -logPath $feLog -pattern 'Tests|passed|failed'
          Add-Content -Path $reportPath -Value "`n---`n" -Encoding UTF8
          Add-SuiteSection -title "Rust Tests (cargo test)" -logPath $rustLog -pattern 'test result|passed|failed'

      # Re-fail the job if any test suite actually failed.
      - name: Fail on test errors
        if: always()
        shell: pwsh
        run: |
          $feFailed = $false
          $rustFailed = $false
          if (Test-Path '${{ github.workspace }}/test-results/frontend.log') {
              $content = Get-Content '${{ github.workspace }}/test-results/frontend.log' -Raw
              if ($content -match '\bfailed\b|FAIL') { $feFailed = $true }
          }
          if (Test-Path '${{ github.workspace }}/test-results/rust.log') {
              $content = Get-Content '${{ github.workspace }}/test-results/rust.log' -Raw
              if ($content -match '\bfailed\b|FAIL') { $rustFailed = $true }
          }
          if ($feFailed -or $rustFailed) {
              Write-Error "One or more test suites failed. See the test report artifact for details."
              exit 1
          }

      # Upload the markdown test report as an artifact.
      # Always runs so it is published regardless of CI outcome.
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-test-report
          path: ${{ github.workspace }}/test-report.md
          retention-days: 14
